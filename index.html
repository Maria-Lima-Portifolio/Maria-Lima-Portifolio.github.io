<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio Jornalístico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header-main">
    <div class="logo" id="logo"></div>
    <nav>
      <ul id="nav-lista"></ul>
    </nav>
  </div>
</header>
<section class="hero" id="sobre">
  <div class="container hero-grid">
    <div>
      <div class="hero-kicker" id="hero-kicker"></div>
      <h1 id="hero-titulo"></h1>
      <div id="hero-paragrafos"></div>
      <a href="#contato" class="btn" id="hero-botao"></a>
    </div>
    <img class="hero-foto" id="hero-foto" src="" alt="">
  </div>
</section>
<section class="secao" id="redacao">
  <div class="container">
    <div class="secao-titulo"><h2 id="titulo-redacao"></h2></div>
    <div class="grid-materias" id="grid-redacao"></div>
  </div>
</section>
<section class="secao">
  <div class="container">
    <div class="secao-titulo"><h2 id="titulo-recentes"></h2></div>
    <div class="grid-materias" id="grid-recentes"></div>
  </div>
</section>
<section class="secao" id="faculdade">
  <div class="container">
    <div class="secao-titulo"><h2 id="titulo-faculdade"></h2></div>
    <div class="grid-materias" id="grid-faculdade"></div>
  </div>
</section>
<section class="secao" id="curriculo">
  <div class="container">
    <div class="secao-titulo"><h2 id="titulo-curriculo"></h2></div>
    <div class="timeline" id="lista-timeline"></div>
  </div>
</section>

<section class="secao" id="blog">
  <div class="container">
    <div class="secao-titulo"><h2 id="titulo-blog"></h2></div>
    <div class="blog-lista" id="lista-blog"></div>
  </div>
</section>

<section class="secao contato" id="contato">
  <div class="container">
    <div class="secao-titulo"><h2 id="titulo-contato"></h2></div>
    <div class="contato-grid">
      <div>
        <p id="contato-texto"></p>
        <a class="contato-email" id="contato-email" href=""></a>
      </div>
      <div>
        <p id="contato-redes-texto"></p>
        <div class="redes" id="contato-redes"></div>
      </div>
    </div>
  </div>
</section>
<footer id="footer-texto"></footer>
<script src="content.js"></script>
<script src="script.js"></script>
</body>
</html>
